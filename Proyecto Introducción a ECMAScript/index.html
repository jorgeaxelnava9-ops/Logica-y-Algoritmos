<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Viajes</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
<main class="app">
    <header>
        <h1>🌎 Planificador de Viajes</h1>
    </header>

    <!--Esta sección es del formulario-->
    <section class="form-section">
        <form id="form-viaje">

            <input
            type="text"
            id="destino"
            placeholder="¿A dónde quieres viajar?"
            required
            >

            <input
            type="date"
            id="fecha"
            required
            >

            <select id="transporte">
            <option value="avion">✈ Avión</option>
            <option value="autobus">🚌 Autobús</option>
            <option value="tren">🚂 tren</option>
            </select>

            <input
             type="number"
             id="personas"
             placeholder="Número de personas"
             min="1"
             required
             >

             <button type="submit">Planear viaje</button>

             </form>
             </section>

        <!--Aquí va el resumen-->
        <section id="resumen">
            <h2>Resumen de viaje</h2>
            <p>No hay información aún</p>
        </section>

        <!--Se agrega itinerario-->
        <section id="itinerario">
            <h2>Itinerario</h2>
        </section>

</main>

<!--Aquí va el enlace de JS principal-->
<script type="module" src="./app.js"></script>

</body>
</html>
